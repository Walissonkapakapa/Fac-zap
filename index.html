<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fac Zap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .message-bubble {
            max-width: 65%;
            padding: 9px 13px;
            border-radius: 8px;
        }
        .my-message {
            background-color: #22c55e;
            color: black;
            border-bottom-right-radius: 3px;
        }
        .other-message {
            background-color: #27272a;
            color: #e5e5e5;
            border-bottom-left-radius: 3px;
        }
        .chat-header {
            background-color: #18181b;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="max-w-sm w-full px-4">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-green-600 rounded-2xl flex items-center justify-center mb-4">
                    <i class="fa-brands fa-whatsapp text-4xl text-black"></i>
                </div>
                <h1 class="text-5xl font-bold tracking-tighter">Fac Zap</h1>
                <p class="text-zinc-400">As facs voltaram</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                <input id="nickname" type="text" value="KrypZin" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-4 text-center">
                <button onclick="login()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden h-screen flex flex-col">
        <!-- Top Bar -->
        <div class="bg-zinc-900 border-b border-zinc-800 px-5 py-3 flex justify-between items-center">
            <div class="flex items-center gap-x-2">
                <i class="fa-brands fa-whatsapp text-green-500 text-2xl"></i>
                <span class="font-bold text-xl">Fac Zap</span>
            </div>
            <div class="flex items-center gap-x-3">
                <span id="current-user" class="text-sm text-zinc-400"></span>
                <button onclick="logout()" class="text-xs px-3 py-1 border border-zinc-700 rounded-xl">Sair</button>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <div class="w-80 border-r border-zinc-800 flex flex-col">
                <div class="p-4 border-b border-zinc-800">
                    <button onclick="showCreateFac()" class="w-full bg-green-600 hover:bg-green-700 py-2.5 rounded-2xl font-semibold flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-plus"></i>
                        <span>Criar Fac</span>
                    </button>
                </div>

                <div class="px-2 flex-1 overflow-auto" id="chat-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Chat Window -->
            <div class="flex-1 flex flex-col">
                <div id="empty-state" class="flex-1 flex items-center justify-center text-zinc-500">
                    Selecione uma fac
                </div>

                <div id="chat-window" class="hidden flex-1 flex flex-col">
                    <!-- Header estilo WhatsApp -->
                    <div class="chat-header px-5 py-3 border-b border-zinc-800 flex items-center justify-between">
                        <div class="flex items-center gap-x-3">
                            <div class="w-10 h-10 bg-zinc-700 rounded-full flex items-center justify-center">
                                <i class="fa-solid fa-users text-green-400"></i>
                            </div>
                            <div>
                                <div id="chat-name" class="font-semibold"></div>
                                <div id="chat-info" class="text-xs text-zinc-500"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-x-4 text-lg text-zinc-400">
                            <i class="fa-solid fa-video cursor-pointer hover:text-white"></i>
                            <button onclick="declareWar()" class="text-red-500 hover:text-red-400">
                                <i class="fa-solid fa-bomb"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Messages -->
                    <div id="messages" class="flex-1 p-6 overflow-auto bg-[#0f0f0f] space-y-4"></div>

                    <!-- Input Bar -->
                    <div class="p-4 border-t border-zinc-800 bg-zinc-900 flex items-center gap-x-2">
                        <i class="fa-regular fa-smile text-xl text-zinc-400 cursor-pointer"></i>
                        <input id="msg-input" type="text" placeholder="Mensagem" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-3xl px-5 py-3 text-sm" onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" class="text-green-500 text-xl px-2">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Fac Modal -->
    <div id="create-modal" onclick="if(event.target.id==='create-modal') hideCreateModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 p-6 rounded-3xl w-full max-w-md mx-4">
            <h3 class="font-semibold mb-4">Criar Nova Fac</h3>
            <input id="fac-name" type="text" value="KRYPTON" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-3">
            <button onclick="createFac()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold">Criar Fac</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let facs = JSON.parse(localStorage.getItem('faczap_facs') || '[]');
        let allMessages = JSON.parse(localStorage.getItem('faczap_messages') || '{}');
        let currentChatId = null;

        function save() {
            localStorage.setItem('faczap_facs', JSON.stringify(facs));
            localStorage.setItem('faczap_messages', JSON.stringify(allMessages));
        }

        function login() {
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return;
            currentUser = { nickname: nick };
            localStorage.setItem('faczap_user', JSON.stringify(currentUser));
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('current-user').innerText = '@' + nick;
            renderChatList();
        }

        function logout() { location.reload(); }

        function showCreateFac() {
            document.getElementById('create-modal').classList.remove('hidden');
            document.getElementById('create-modal').classList.add('flex');
        }

        function hideCreateModal() {
            document.getElementById('create-modal').classList.remove('flex');
            document.getElementById('create-modal').classList.add('hidden');
        }

        function createFac() {
            const name = document.getElementById('fac-name').value.trim();
            if (!name) return;

            const newFac = { id: Date.now(), name: name, leader: currentUser.nickname, members: [currentUser.nickname] };
            facs.push(newFac);
            allMessages[newFac.id] = [];
            save();
            hideCreateModal();
            renderChatList();
            setTimeout(() => openChat(newFac.id), 150);
        }

        function renderChatList() {
            const container = document.getElementById('chat-list');
            container.innerHTML = '';

            facs.forEach(fac => {
                if (fac.members.includes(currentUser.nickname)) {
                    const div = document.createElement('div');
                    div.className = `px-4 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer flex items-center gap-x-3 ${currentChatId === fac.id ? 'bg-zinc-800' : ''}`;
                    div.innerHTML = `
                        <div class="w-9 h-9 bg-zinc-700 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-users text-green-400"></i>
                        </div>
                        <div>
                            <div class="font-semibold">${fac.name}</div>
                            <div class="text-xs text-zinc-500">${fac.members.length} membros</div>
                        </div>
                    `;
                    div.onclick = () => openChat(fac.id);
                    container.appendChild(div);
                }
            });
        }

        function openChat(facId) {
            currentChatId = facId;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-window').classList.remove('hidden');

            const fac = facs.find(f => f.id === facId);
            document.getElementById('chat-name').innerText = fac.name;
            document.getElementById('chat-info').innerText = `${fac.members.length} membros • Grupo da Fac`;

            renderMessages();
            renderChatList();
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            const msgs = allMessages[currentChatId] || [];

            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `flex ${msg.from === currentUser.nickname ? 'justify-end' : 'justify-start'}`;
                div.innerHTML = `
                    <div class="max-w-[75%]">
                        ${msg.from !== currentUser.nickname ? `<div class="text-xs text-zinc-400 mb-1 ml-2">@${msg.from}</div>` : ''}
                        <div class="message-bubble ${msg.from === currentUser.nickname ? 'my-message' : 'other-message'}">${msg.text}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim() || !currentChatId) return;

            if (!allMessages[currentChatId]) allMessages[currentChatId] = [];

            allMessages[currentChatId].push({
                from: currentUser.nickname,
                text: input.value.trim(),
                time: new Date().toISOString()
            });

            save();
            input.value = '';
            renderMessages();
        }

        function declareWar() {
            if (!currentChatId) return;
            const fac = facs.find(f => f.id === currentChatId);
            const text = prompt('Mensagem de guerra:', `A ${fac.name} declara guerra!`);
            if (!text) return;

            allMessages[currentChatId].push({
                from: currentUser.nickname,
                text: `⚔️ ${text}`,
                time: new Date().toISOString()
            });
            save();
            renderMessages();
        }

        function checkLogin() {
            const user = localStorage.getItem('faczap_user');
            if (user) {
                currentUser = JSON.parse(user);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('current-user').innerText = '@' + currentUser.nickname;
                renderChatList();
            }
        }

        window.onload = checkLogin;
    </script>
</body>
</html>

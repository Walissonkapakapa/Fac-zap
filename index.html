<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fac Zap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .message-bubble { max-width: 65%; padding: 8px 12px; border-radius: 7.5px; }
        .my-message { background-color: #22c55e; color: black; border-bottom-right-radius: 2px; }
        .other-message { background-color: #27272a; color: #e5e5e5; border-bottom-left-radius: 2px; }
        #messages { scroll-behavior: smooth; }
        .chat-image { max-width: 220px; max-height: 220px; border-radius: 12px; object-fit: cover; display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center">
        <div class="max-w-sm w-full px-4">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-green-600 rounded-2xl flex items-center justify-center mb-4">
                    <i class="fa-brands fa-whatsapp text-4xl text-black"></i>
                </div>
                <h1 class="text-5xl font-bold tracking-tighter">Fac Zap</h1>
                <p class="text-zinc-400">As facs voltaram</p>
            </div>

            <div id="login-form" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4 text-center">Entrar</h2>
                <input id="login-nickname" type="text" placeholder="Apelido" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-3">
                <input id="login-password" type="password" placeholder="Senha" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-4">
                <button onclick="login()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold mb-3">Entrar</button>
                <p class="text-center text-sm text-zinc-400">Não tem conta? <span onclick="showRegister()" class="text-green-500 cursor-pointer">Cadastre-se</span></p>
            </div>

            <div id="register-form" class="hidden bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4 text-center">Criar Conta</h2>
                <input id="register-nickname" type="text" placeholder="Apelido" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-3">
                <input id="register-password" type="password" placeholder="Senha" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-4">
                <button onclick="register()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold mb-3">Cadastrar</button>
                <p class="text-center text-sm text-zinc-400">Já tem conta? <span onclick="showLogin()" class="text-green-500 cursor-pointer">Entrar</span></p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden h-screen flex flex-col">
        <div class="bg-zinc-900 border-b border-zinc-800 px-5 py-3 flex justify-between items-center">
            <div class="flex items-center gap-x-2">
                <i class="fa-brands fa-whatsapp text-green-500 text-2xl"></i>
                <span class="font-bold text-xl">Fac Zap</span>
            </div>
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="editProfile()">
                <img id="header-avatar" src="https://i.pravatar.cc/32" class="w-8 h-8 rounded-full object-cover border border-zinc-700">
                <span id="current-user" class="text-sm text-zinc-400"></span>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <div id="sidebar" class="w-80 border-r border-zinc-800 flex flex-col">
                <div class="p-3 border-b border-zinc-800">
                    <input type="text" placeholder="Buscar..." class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-2 text-sm">
                </div>

                <div class="p-3">
                    <button onclick="showCreateFac()" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded-2xl font-semibold text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-plus"></i>
                        <span>Criar Nova Fac</span>
                    </button>
                </div>

                <div class="px-2 text-xs uppercase tracking-widest text-zinc-500 px-3 mb-1">Minhas Facs</div>
                <div class="px-2 flex-1 overflow-auto" id="chat-list"></div>

                <div class="px-2 mt-2">
                    <div class="text-xs uppercase tracking-widest text-zinc-500 px-3 mb-1">Outras Facs</div>
                    <div id="other-facs-list" class="px-2"></div>
                </div>
            </div>

            <div class="flex-1 flex flex-col">
                <div id="empty-state" class="flex-1 flex items-center justify-center text-zinc-500">
                    Selecione ou entre em uma conversa
                </div>

                <div id="chat-window" class="hidden flex-1 flex flex-col">
                    <div class="px-4 py-2.5 border-b border-zinc-800 flex items-center gap-x-3 bg-[#18181b]">
                        <button onclick="backToList()" class="text-xl px-2 text-zinc-400 hover:text-white">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div class="flex items-center gap-x-3 flex-1">
                            <img id="chat-avatar" src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full object-cover border border-zinc-700">
                            <div>
                                <div id="chat-name" class="font-semibold"></div>
                                <div id="chat-info" class="text-xs text-emerald-400"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-x-4">
                            <button id="change-fac-photo-btn" onclick="changeFacPhoto()" class="text-xs px-3 py-1 bg-zinc-800 hover:bg-zinc-700 rounded-xl hidden">Mudar Foto</button>
                            <button onclick="clearMessages()" class="text-xs px-3 py-1 bg-red-600 hover:bg-red-700 rounded-xl">Limpar Msgs</button>
                            <button id="delete-fac-btn" onclick="deleteFac()" class="text-xs px-3 py-1 bg-red-600 hover:bg-red-700 rounded-xl hidden">Apagar Fac</button>
                            <button onclick="leaveFac()" class="text-xs px-3 py-1 bg-zinc-800 hover:bg-red-600 rounded-xl">Sair</button>
                            <button onclick="declareWar()" class="text-red-500"><i class="fa-solid fa-bomb"></i></button>
                        </div>
                    </div>

                    <div id="messages" class="flex-1 p-5 overflow-auto bg-[#0f0f0f] space-y-3"></div>

                    <div class="p-3 border-t border-zinc-800 bg-zinc-900 flex items-center gap-x-2">
                        <label class="cursor-pointer">
                            <i class="fa-regular fa-image text-xl text-zinc-400"></i>
                            <input type="file" accept="image/*" class="hidden" id="image-input" onchange="sendImage(event)">
                        </label>
                        <input id="msg-input" type="text" placeholder="Mensagem" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-3xl px-4 py-2.5 text-sm" onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" class="text-green-500 px-3"><i class="fa-solid fa-paper-plane text-xl"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Fac Modal -->
    <div id="create-modal" onclick="if(event.target.id==='create-modal') hideCreateModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 p-6 rounded-3xl w-full max-w-md mx-4">
            <h3 class="font-semibold mb-4">Criar Nova Fac</h3>
            <div class="flex flex-col items-center mb-4">
                <img id="fac-preview" src="https://picsum.photos/id/1011/80/80" class="w-20 h-20 rounded-2xl object-cover border border-zinc-700 mb-2">
                <input type="file" id="fac-photo-upload" accept="image/*" class="hidden" onchange="previewFacPhoto(event)">
                <button onclick="document.getElementById('fac-photo-upload').click()" class="text-xs bg-zinc-800 px-3 py-1 rounded-xl">Escolher foto da fac</button>
            </div>
            <input id="fac-name" type="text" value="KRYPTON" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-3">
            <button onclick="createFac()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold">Criar Fac</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" onclick="if(event.target.id==='profile-modal') hideProfileModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 w-full max-w-sm mx-4">
            <h3 class="font-semibold mb-4">Seu Perfil</h3>
            <div class="flex flex-col items-center">
                <img id="profile-avatar" src="https://i.pravatar.cc/80" class="w-20 h-20 rounded-full object-cover border border-zinc-700 mb-4">
                <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
                <button onclick="document.getElementById('avatar-upload').click()" class="text-sm bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl mb-4">
                    Mudar foto do perfil
                </button>
            </div>
            <button onclick="hideProfileModal()" class="w-full py-2 rounded-2xl border border-zinc-700">Fechar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDg5pqfwpO12boJpyZuJI0L-WCIrfttMFs",
            authDomain: "faczap-1b2b8.firebaseapp.com",
            projectId: "faczap-1b2b8",
            storageBucket: "faczap-1b2b8.firebasestorage.app",
            messagingSenderId: "273370846564",
            appId: "1:273370846564:web:6f5cf35be2d1e3ea2dd671"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.addDoc = addDoc;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.where = where;
        window.updateDoc = updateDoc;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;
    </script>

    <script>
        let currentUser = null;
        let facs = [];
        let allMessages = {};
        let currentChatId = null;
        let pendingFacPhoto = null;
        let unsubscribeMessages = null;

        function scrollToBottom() {
            const el = document.getElementById('messages');
            if (el) el.scrollTop = el.scrollHeight;
        }

        async function loadFacsFromFirebase() {
            try {
                const q = window.query(window.collection(window.db, "facs"));
                const snap = await window.getDocs(q);
                facs = [];
                snap.forEach(d => {
                    const data = d.data();
                    data.firestoreId = d.id;
                    facs.push(data);
                });
            } catch(e){ console.error(e); }
        }

        function startMessageListener(facId) {
            if (unsubscribeMessages) unsubscribeMessages();

            const q = window.query(window.collection(window.db, `messages_${facId}`));
            unsubscribeMessages = window.onSnapshot(q, (snapshot) => {
                allMessages[facId] = [];
                snapshot.forEach(doc => allMessages[facId].push(doc.data()));
                if (currentChatId === facId) {
                    renderMessages();
                    scrollToBottom();
                }
            });
        }

        function stopMessageListener() {
            if (unsubscribeMessages) {
                unsubscribeMessages();
                unsubscribeMessages = null;
            }
        }

        async function register() {
            const nick = document.getElementById('register-nickname').value.trim();
            const pass = document.getElementById('register-password').value.trim();
            if (!nick || !pass) return alert("Preencha apelido e senha");

            try {
                const usersRef = window.collection(window.db, "users");
                const q = window.query(usersRef, window.where("nickname", "==", nick));
                const snap = await window.getDocs(q);
                if (!snap.empty) return alert("Esse apelido já existe");

                await window.addDoc(usersRef, { nickname: nick, password: pass, photo: null });
                alert("Conta criada! Faça login.");
                showLogin();
            } catch (error) {
                console.error(error);
                alert("Erro ao cadastrar");
            }
        }

        async function login() {
            const nick = document.getElementById('login-nickname').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!nick || !pass) return alert("Preencha apelido e senha");

            try {
                const q = window.query(window.collection(window.db, "users"), window.where("nickname", "==", nick), window.where("password", "==", pass));
                const snap = await window.getDocs(q);

                if (snap.empty) return alert("Apelido ou senha incorretos");

                const userDoc = snap.docs[0].data();
                currentUser = { nickname: nick, photo: userDoc.photo || null };
                localStorage.setItem('faczap_user', JSON.stringify(currentUser));

                await loadFacsFromFirebase();

                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('current-user').innerText = '@' + nick;
                updateHeaderAvatar();
                renderChatList();
                renderOtherFacs();
            } catch (error) {
                console.error(error);
                alert("Erro ao fazer login");
            }
        }

        function updateHeaderAvatar() {
            const avatar = document.getElementById('header-avatar');
            avatar.src = currentUser?.photo || 'https://i.pravatar.cc/32';
        }

        function logout() {
            stopMessageListener();
            localStorage.removeItem('faczap_user');
            currentUser = null;
            location.reload();
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        function editProfile() {
            const modal = document.getElementById('profile-modal');
            document.getElementById('profile-avatar').src = currentUser?.photo || 'https://i.pravatar.cc/80';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideProfileModal() {
            document.getElementById('profile-modal').classList.remove('flex');
            document.getElementById('profile-modal').classList.add('hidden');
        }

        async function uploadAvatar(e) {
            const file = e.target.files[0];
            if (!file || !currentUser) return;

            const reader = new FileReader();
            reader.onload = async function(ev) {
                currentUser.photo = ev.target.result;
                try {
                    const usersRef = window.collection(window.db, "users");
                    const q = window.query(usersRef, window.where("nickname", "==", currentUser.nickname));
                    const snap = await window.getDocs(q);
                    if (!snap.empty) {
                        await window.updateDoc(window.doc(window.db, "users", snap.docs[0].id), { photo: currentUser.photo });
                    }
                } catch(e){}
                document.getElementById('profile-avatar').src = currentUser.photo;
                updateHeaderAvatar();
            };
            reader.readAsDataURL(file);
        }

        async function createFac() {
            const name = document.getElementById('fac-name').value.trim();
            if (!name || !currentUser) return;

            const exists = facs.some(f => f.name && f.name.toLowerCase() === name.toLowerCase());
            if (exists) return alert("Já existe uma fac com esse nome");

            const newFac = {
                id: Date.now(),
                name,
                leader: currentUser.nickname,
                members: [currentUser.nickname],
                photo: pendingFacPhoto || 'https://picsum.photos/id/1011/80/80'
            };

            try {
                const docRef = await window.addDoc(window.collection(window.db, "facs"), newFac);
                newFac.firestoreId = docRef.id;
                facs.push(newFac);
                hideCreateModal();
                renderChatList();
                renderOtherFacs();
                setTimeout(() => openChat(newFac.id), 100);
            } catch(e){ alert("Erro ao criar fac"); }
        }

        function showCreateFac() {
            pendingFacPhoto = null;
            document.getElementById('fac-preview').src = 'https://picsum.photos/id/1011/80/80';
            document.getElementById('create-modal').classList.remove('hidden');
            document.getElementById('create-modal').classList.add('flex');
        }

        function hideCreateModal() {
            document.getElementById('create-modal').classList.remove('flex');
            document.getElementById('create-modal').classList.add('hidden');
        }

        async function joinFac(facId) {
            const fac = facs.find(f => f.id === facId);
            if (!fac || !currentUser) return;
            if (!fac.members.includes(currentUser.nickname)) {
                fac.members.push(currentUser.nickname);
                if (fac.firestoreId) {
                    try { await window.updateDoc(window.doc(window.db, "facs", fac.firestoreId), { members: fac.members }); } catch(e){}
                }
            }
            renderChatList();
            renderOtherFacs();
            openChat(facId);
        }

        function leaveFac() {
            if (!currentChatId) return;
            const fac = facs.find(f => f.id === currentChatId);
            if (!fac) return;
            fac.members = fac.members.filter(m => m !== currentUser.nickname);
            if (fac.firestoreId) window.updateDoc(window.doc(window.db, "facs", fac.firestoreId), { members: fac.members });
            backToList();
        }

        async function changeFacPhoto() {
            const fac = facs.find(f => f.id === currentChatId);
            if (!fac || fac.leader !== currentUser.nickname) return alert('Só o líder pode mudar.');

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async e => {
                const reader = new FileReader();
                reader.onload = async ev => {
                    fac.photo = ev.target.result;
                    if (fac.firestoreId) {
                        try { await window.updateDoc(window.doc(window.db, "facs", fac.firestoreId), { photo: fac.photo }); } catch(e){}
                    }
                    document.getElementById('chat-avatar').src = fac.photo;
                    renderChatList();
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function deleteFac() {
            const fac = facs.find(f => f.id === currentChatId);
            if (!fac || fac.leader !== currentUser.nickname) return alert('Só o líder pode apagar.');
            if (confirm(`Apagar ${fac.name}?`)) {
                facs = facs.filter(f => f.id !== currentChatId);
                backToList();
            }
        }

        async function clearMessages() {
            if (!currentChatId) return;
            if (!confirm("Apagar TODAS as mensagens?")) return;

            try {
                const q = window.query(window.collection(window.db, `messages_${currentChatId}`));
                const snap = await window.getDocs(q);
                const deletions = [];
                snap.forEach(d => deletions.push(window.deleteDoc(window.doc(window.db, `messages_${currentChatId}`, d.id))));
                await Promise.all(deletions);
                allMessages[currentChatId] = [];
                renderMessages();
                alert("Mensagens limpas!");
            } catch(e){ alert("Erro"); }
        }

        function backToList() {
            stopMessageListener();
            currentChatId = null;
            document.getElementById('chat-window').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            renderChatList();
        }

        async function openChat(facId) {
            stopMessageListener();
            currentChatId = facId;
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-window').classList.remove('hidden');

            const fac = facs.find(f => f.id === facId);
            if (!fac) return;

            document.getElementById('chat-name').innerText = fac.name;
            document.getElementById('chat-info').innerText = `${fac.members.length} membros`;
            document.getElementById('chat-avatar').src = fac.photo || 'https://picsum.photos/id/1011/80/80';

            startMessageListener(facId);
            setTimeout(scrollToBottom, 80);
        }

        function renderChatList() {
            const c = document.getElementById('chat-list');
            c.innerHTML = '';
            facs.forEach(fac => {
                if (fac.members && fac.members.includes(currentUser.nickname)) {
                    const d = document.createElement('div');
                    d.className = 'px-3 py-3 hover:bg-zinc-800 rounded-2xl flex gap-x-3 cursor-pointer';
                    d.innerHTML = `
                        <img src="${fac.photo || 'https://picsum.photos/id/1011/80/80'}" class="w-9 h-9 rounded-2xl object-cover">
                        <div>
                            <div class="font-semibold">${fac.name}</div>
                            <div class="text-xs text-zinc-500">${fac.members.length} membros</div>
                        </div>`;
                    d.onclick = () => openChat(fac.id);
                    c.appendChild(d);
                }
            });
        }

        function renderOtherFacs() {
            const c = document.getElementById('other-facs-list');
            c.innerHTML = '';
            facs.forEach(fac => {
                if (fac.members && !fac.members.includes(currentUser.nickname)) {
                    const d = document.createElement('div');
                    d.className = 'px-3 py-2 flex justify-between items-center hover:bg-zinc-800 rounded-2xl';
                    d.innerHTML = `
                        <div class="flex items-center gap-x-2">
                            <img src="${fac.photo || 'https://picsum.photos/id/1011/80/80'}" class="w-7 h-7 rounded-xl">
                            <span>${fac.name}</span>
                        </div>
                        <button class="text-xs bg-green-600 px-2 py-0.5 rounded">Entrar</button>`;
                    d.querySelector('button').onclick = e => { e.stopImmediatePropagation(); joinFac(fac.id); };
                    c.appendChild(d);
                }
            });
        }

        function renderMessages() {
            const c = document.getElementById('messages');
            c.innerHTML = '';

            let msgs = allMessages[currentChatId] || [];
            msgs = msgs.sort((a, b) => new Date(a.time) - new Date(b.time));

            msgs.forEach(m => {
                const isMe = m.from === currentUser.nickname;
                const d = document.createElement('div');
                d.className = `flex ${isMe ? 'justify-end' : ''} gap-x-2`;

                let html = '';

                if (!isMe) {
                    html += `<img src="https://i.pravatar.cc/28" class="w-7 h-7 rounded-full flex-shrink-0">`;
                }

                html += `
                    <div class="max-w-[70%]">
                        ${!isMe ? `<div class="text-xs text-emerald-400 mb-0.5 ml-1 font-medium">@${m.from}</div>` : ''}
                        ${m.image ? `<img src="${m.image}" class="chat-image my-1" onerror="this.style.display='none'">` : ''}
                        ${m.text ? `<div class="message-bubble ${isMe ? 'my-message' : 'other-message'}">${m.text}</div>` : ''}
                    </div>
                `;

                if (isMe) {
                    html += `<img src="https://i.pravatar.cc/28" class="w-7 h-7 rounded-full flex-shrink-0">`;
                }

                d.innerHTML = html;
                c.appendChild(d);
            });

            setTimeout(scrollToBottom, 30);
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim() || !currentChatId) return;

            const data = { from: currentUser.nickname, text: input.value.trim(), time: new Date().toISOString() };
            try {
                await window.addDoc(window.collection(window.db, `messages_${currentChatId}`), data);
            } catch(e){}
            input.value = '';
        }

        async function sendImage(e) {
            const file = e.target.files[0];
            if (!file || !currentChatId) return;

            const reader = new FileReader();
            reader.onload = async function(ev) {
                const imageData = ev.target.result;

                const data = {
                    from: currentUser.nickname,
                    image: imageData,
                    time: new Date().toISOString()
                };

                try {
                    await window.addDoc(window.collection(window.db, `messages_${currentChatId}`), data);
                } catch(err){ console.error(err); }
            };
            reader.readAsDataURL(file);

            // Limpa o input para poder enviar outra foto
            e.target.value = '';
        }

        function declareWar() {
            if (!currentChatId) return;
            const t = prompt("Mensagem de guerra:");
            if (!t) return;
            window.addDoc(window.collection(window.db, `messages_${currentChatId}`), { from: currentUser.nickname, text: `⚔️ ${t}`, time: new Date().toISOString() });
        }

        window.onload = async () => {
            const saved = localStorage.getItem('faczap_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                await loadFacsFromFirebase();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('current-user').innerText = '@' + currentUser.nickname;
                updateHeaderAvatar();
                renderChatList();
                renderOtherFacs();
            }
        };
    </script>
</body>
</html>

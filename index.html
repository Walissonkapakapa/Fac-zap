<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fac Zap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .message-bubble { max-width: 65%; padding: 8px 12px; border-radius: 7.5px; }
        .my-message { background-color: #22c55e; color: black; border-bottom-right-radius: 2px; }
        .other-message { background-color: #27272a; color: #e5e5e5; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="max-w-sm w-full px-4">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-green-600 rounded-2xl flex items-center justify-center mb-4">
                    <i class="fa-brands fa-whatsapp text-4xl text-black"></i>
                </div>
                <h1 class="text-5xl font-bold tracking-tighter">Fac Zap</h1>
                <p class="text-zinc-400">As facs voltaram</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                <input id="nickname" type="text" value="KrypZin" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-4 text-center">
                <button onclick="login()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden h-screen flex flex-col">
        <div class="bg-zinc-900 border-b border-zinc-800 px-5 py-3 flex justify-between items-center">
            <div class="flex items-center gap-x-2">
                <i class="fa-brands fa-whatsapp text-green-500 text-2xl"></i>
                <span class="font-bold text-xl">Fac Zap</span>
            </div>
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="editProfile()">
                <img id="header-avatar" src="https://i.pravatar.cc/32" class="w-8 h-8 rounded-full object-cover border border-zinc-700">
                <span id="current-user" class="text-sm text-zinc-400"></span>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <div id="sidebar" class="w-80 border-r border-zinc-800 flex flex-col">
                <div class="p-3 border-b border-zinc-800">
                    <input type="text" placeholder="Buscar..." class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-2 text-sm">
                </div>

                <div class="p-3">
                    <button onclick="showCreateFac()" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded-2xl font-semibold text-sm flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-plus"></i>
                        <span>Criar Nova Fac</span>
                    </button>
                </div>

                <div class="px-2 text-xs uppercase tracking-widest text-zinc-500 px-3 mb-1">Minhas Facs</div>
                <div class="px-2 flex-1 overflow-auto" id="chat-list"></div>

                <div class="px-2 mt-2">
                    <div class="text-xs uppercase tracking-widest text-zinc-500 px-3 mb-1">Outras Facs</div>
                    <div id="other-facs-list" class="px-2"></div>
                </div>
            </div>

            <!-- Chat -->
            <div class="flex-1 flex flex-col">
                <div id="empty-state" class="flex-1 flex items-center justify-center text-zinc-500">
                    Selecione ou entre em uma conversa
                </div>

                <div id="chat-window" class="hidden flex-1 flex flex-col">
                    <div class="px-4 py-2.5 border-b border-zinc-800 flex items-center gap-x-3 bg-[#18181b]">
                        <button onclick="backToList()" class="text-xl px-2 text-zinc-400 hover:text-white">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div class="flex items-center gap-x-3 flex-1">
                            <img id="chat-avatar" src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full object-cover border border-zinc-700">
                            <div>
                                <div id="chat-name" class="font-semibold"></div>
                                <div id="chat-info" class="text-xs text-emerald-400"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-x-4">
                            <button onclick="leaveFac()" class="text-xs px-3 py-1 bg-zinc-800 hover:bg-red-600 rounded-xl">Sair</button>
                            <button onclick="declareWar()" class="text-red-500"><i class="fa-solid fa-bomb"></i></button>
                        </div>
                    </div>

                    <div id="messages" class="flex-1 p-5 overflow-auto bg-[#0f0f0f] space-y-3"></div>

                    <div class="p-3 border-t border-zinc-800 bg-zinc-900 flex items-center gap-x-2">
                        <i class="fa-regular fa-smile text-xl text-zinc-400"></i>
                        <input id="msg-input" type="text" placeholder="Mensagem" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-3xl px-4 py-2.5 text-sm" onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" class="text-green-500 px-3"><i class="fa-solid fa-paper-plane text-xl"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Fac Modal -->
    <div id="create-modal" onclick="if(event.target.id==='create-modal') hideCreateModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 p-6 rounded-3xl w-full max-w-md mx-4">
            <h3 class="font-semibold mb-4">Criar Nova Fac</h3>
            
            <div class="flex flex-col items-center mb-4">
                <img id="fac-preview" src="https://i.pravatar.cc/80?img=3" class="w-20 h-20 rounded-2xl object-cover border border-zinc-700 mb-2">
                <input type="file" id="fac-photo-upload" accept="image/*" class="hidden" onchange="previewFacPhoto(event)">
                <button onclick="document.getElementById('fac-photo-upload').click()" class="text-xs bg-zinc-800 px-3 py-1 rounded-xl">Escolher foto da fac</button>
            </div>

            <input id="fac-name" type="text" value="KRYPTON" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 mb-3">
            <button onclick="createFac()" class="w-full bg-green-600 py-3 rounded-2xl font-semibold">Criar Fac</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" onclick="if(event.target.id==='profile-modal') hideProfileModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 w-full max-w-sm mx-4">
            <h3 class="font-semibold mb-4">Seu Perfil</h3>
            <div class="flex flex-col items-center">
                <img id="profile-avatar" src="https://i.pravatar.cc/80" class="w-20 h-20 rounded-full object-cover border border-zinc-700 mb-4">
                <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
                <button onclick="document.getElementById('avatar-upload').click()" class="text-sm bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl mb-4">
                    Mudar foto de perfil
                </button>
            </div>
            <button onclick="hideProfileModal()" class="w-full py-2 rounded-2xl border border-zinc-700">Fechar</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let facs = JSON.parse(localStorage.getItem('faczap_facs') || '[]');
        let allMessages = JSON.parse(localStorage.getItem('faczap_messages') || '{}');
        let currentChatId = null;
        let pendingFacPhoto = null;

        function save() {
            localStorage.setItem('faczap_facs', JSON.stringify(facs));
            localStorage.setItem('faczap_messages', JSON.stringify(allMessages));
            if (currentUser) localStorage.setItem('faczap_user', JSON.stringify(currentUser));
        }

        function login() {
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return;
            currentUser = JSON.parse(localStorage.getItem('faczap_user')) || { nickname: nick, avatar: 'https://i.pravatar.cc/128?img=47' };
            if (!currentUser.avatar) currentUser.avatar = 'https://i.pravatar.cc/128?img=47';
            localStorage.setItem('faczap_user', JSON.stringify(currentUser));
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('current-user').innerText = '@' + currentUser.nickname;
            document.getElementById('header-avatar').src = currentUser.avatar;
            renderChatList();
            renderOtherFacs();
        }

        function logout() { localStorage.removeItem('faczap_user'); location.reload(); }

        function editProfile() {
            document.getElementById('profile-modal').classList.remove('hidden');
            document.getElementById('profile-modal').classList.add('flex');
            document.getElementById('profile-avatar').src = currentUser.avatar;
        }

        function hideProfileModal() {
            document.getElementById('profile-modal').classList.remove('flex');
            document.getElementById('profile-modal').classList.add('hidden');
        }

        function uploadAvatar(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentUser.avatar = ev.target.result;
                document.getElementById('profile-avatar').src = currentUser.avatar;
                document.getElementById('header-avatar').src = currentUser.avatar;
                save();
            };
            reader.readAsDataURL(file);
        }

        function previewFacPhoto(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                pendingFacPhoto = ev.target.result;
                document.getElementById('fac-preview').src = pendingFacPhoto;
            };
            reader.readAsDataURL(file);
        }

        function showCreateFac() {
            pendingFacPhoto = null;
            document.getElementById('fac-preview').src = 'https://i.pravatar.cc/80?img=3';
            document.getElementById('create-modal').classList.remove('hidden');
            document.getElementById('create-modal').classList.add('flex');
        }

        function hideCreateModal() {
            document.getElementById('create-modal').classList.remove('flex');
            document.getElementById('create-modal').classList.add('hidden');
        }

        function createFac() {
            const name = document.getElementById('fac-name').value.trim();
            if (!name) return;

            const newFac = {
                id: Date.now(),
                name: name,
                leader: currentUser.nickname,
                members: [currentUser.nickname],
                photo: pendingFacPhoto || 'https://i.pravatar.cc/80?img=3'
            };
            facs.push(newFac);
            allMessages[newFac.id] = [];
            save();
            hideCreateModal();
            renderChatList();
            renderOtherFacs();
            setTimeout(() => openChat(newFac.id), 150);
        }

        function joinFac(facId) {
            const fac = facs.find(f => f.id === facId);
            if (!fac) return;
            if (!fac.members.includes(currentUser.nickname)) {
                fac.members.push(currentUser.nickname);
                save();
            }
            renderChatList();
            renderOtherFacs();
            openChat(facId);
        }

        function leaveFac() {
            if (!currentChatId) return;
            const fac = facs.find(f => f.id === currentChatId);
            if (!fac) return;

            if (confirm(`Sair da fac ${fac.name}?`)) {
                fac.members = fac.members.filter(m => m !== currentUser.nickname);
                save();
                backToList();
            }
        }

        function backToList() {
            currentChatId = null;
            document.getElementById('chat-window').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            renderChatList();
        }

        function openChat(facId) {
            currentChatId = facId;
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-window').classList.remove('hidden');

            const fac = facs.find(f => f.id === facId);
            document.getElementById('chat-name').innerText = fac.name;
            document.getElementById('chat-info').innerText = `${fac.members.length} membros • online`;
            // Usa a foto da fac no header do chat
            document.getElementById('chat-avatar').src = fac.photo || 'https://i.pravatar.cc/40';

            renderMessages();
        }

        function renderChatList() {
            const container = document.getElementById('chat-list');
            container.innerHTML = '';

            facs.forEach(fac => {
                if (fac.members.includes(currentUser.nickname)) {
                    const div = document.createElement('div');
                    div.className = `px-3 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer flex items-center gap-x-3`;
                    div.innerHTML = `
                        <img src="${fac.photo || 'https://i.pravatar.cc/32?img=3'}" class="w-9 h-9 rounded-2xl object-cover border border-zinc-700">
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold truncate">${fac.name}</div>
                            <div class="text-xs text-zinc-500">${fac.members.length} membros</div>
                        </div>
                    `;
                    div.onclick = () => openChat(fac.id);
                    container.appendChild(div);
                }
            });
        }

        function renderOtherFacs() {
            const container = document.getElementById('other-facs-list');
            container.innerHTML = '';

            let hasOther = false;
            facs.forEach(fac => {
                if (!fac.members.includes(currentUser.nickname)) {
                    hasOther = true;
                    const div = document.createElement('div');
                    div.className = 'px-3 py-2 hover:bg-zinc-800 rounded-2xl cursor-pointer flex items-center justify-between text-sm';
                    div.innerHTML = `
                        <div class="flex items-center gap-x-2">
                            <img src="${fac.photo || 'https://i.pravatar.cc/32?img=3'}" class="w-7 h-7 rounded-xl object-cover">
                            <span>${fac.name}</span>
                        </div>
                        <button class="text-xs bg-green-600 px-2 py-0.5 rounded">Entrar</button>
                    `;
                    div.querySelector('button').onclick = (e) => { e.stopImmediatePropagation(); joinFac(fac.id); };
                    container.appendChild(div);
                }
            });

            if (!hasOther) container.innerHTML = `<div class="text-xs text-zinc-500 px-3">Nenhuma outra fac disponível</div>`;
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            const msgs = allMessages[currentChatId] || [];

            msgs.forEach(msg => {
                const isMe = msg.from === currentUser.nickname;
                const div = document.createElement('div');
                div.className = `flex items-end gap-x-2 ${isMe ? 'justify-end' : 'justify-start'}`;

                let html = '';
                if (!isMe) {
                    html += `<img src="${currentUser.avatar}" class="w-7 h-7 rounded-full object-cover flex-shrink-0">`;
                }

                html += `
                    <div class="max-w-[70%]">
                        ${!isMe ? `<div class="text-xs text-zinc-400 mb-0.5 ml-1">@${msg.from}</div>` : ''}
                        <div class="message-bubble ${isMe ? 'my-message' : 'other-message'}">${msg.text}</div>
                        <div class="text-[10px] opacity-60 mt-0.5 ${isMe ? 'text-right pr-1' : 'pl-1'}">${new Date(msg.time).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                `;

                if (isMe) {
                    html += `<img src="${currentUser.avatar}" class="w-7 h-7 rounded-full object-cover flex-shrink-0">`;
                }

                div.innerHTML = html;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim() || !currentChatId) return;

            if (!allMessages[currentChatId]) allMessages[currentChatId] = [];

            allMessages[currentChatId].push({
                from: currentUser.nickname,
                text: input.value.trim(),
                time: new Date().toISOString()
            });

            save();
            input.value = '';
            renderMessages();
        }

        function declareWar() {
            if (!currentChatId) return;
            const fac = facs.find(f => f.id === currentChatId);
            const text = prompt('Mensagem de guerra:', `A ${fac.name} declara guerra!`);
            if (!text) return;

            allMessages[currentChatId].push({
                from: currentUser.nickname,
                text: `⚔️ ${text}`,
                time: new Date().toISOString()
            });
            save();
            renderMessages();
        }

        function checkLogin() {
            const user = localStorage.getItem('faczap_user');
            if (user) {
                currentUser = JSON.parse(user);
                if (!currentUser.avatar) currentUser.avatar = 'https://i.pravatar.cc/128?img=47';
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('current-user').innerText = '@' + currentUser.nickname;
                document.getElementById('header-avatar').src = currentUser.avatar;
                renderChatList();
                renderOtherFacs();
            }
        }

        window.onload = checkLogin;
    </script>
</body>
</html>
